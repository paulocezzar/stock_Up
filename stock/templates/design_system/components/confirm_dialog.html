{% comment %}
Reusable BP confirm dialog for destructive actions. Include once per page.
Any <button data-confirm-delete data-confirm-name="…"> inside a <form> opens
this dialog; "Delete" submits that form, "Cancel" / Esc / backdrop aborts.
Vanilla JS, no dependencies. The guard is real: triggers are type="button",
so a delete can never POST without the explicit confirm step.
{% endcomment %}
<div id="su-confirm" data-testid="confirm-dialog" aria-hidden="true"
     class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/50 p-4">
  <div role="dialog" aria-modal="true" aria-labelledby="su-confirm-title"
       class="w-full max-w-sm rounded-xl border border-slate-200 bg-white p-5 shadow-xl dark:border-slate-800 dark:bg-slate-900">
    <h3 id="su-confirm-title" class="font-display text-base font-semibold text-slate-950 dark:text-slate-100">Confirm delete</h3>
    <p id="su-confirm-msg" class="mt-2 text-sm text-slate-600 dark:text-slate-400">This can't be undone.</p>
    <div class="mt-5 flex justify-end gap-2">
      <button type="button" id="su-confirm-cancel" class="inline-flex h-9 items-center rounded-lg border border-slate-200 bg-white px-3 text-sm font-medium text-slate-700 shadow-sm transition hover:border-slate-300 hover:text-slate-950 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:border-slate-700 dark:hover:text-white">Cancel</button>
      <button type="button" id="su-confirm-ok" class="inline-flex h-9 items-center rounded-lg bg-rose-600 px-3 text-sm font-semibold text-white shadow-sm transition hover:bg-rose-700">Delete</button>
    </div>
  </div>
</div>
<script>
  (function () {
    var modal = document.getElementById("su-confirm");
    if (!modal) return;
    var msg = document.getElementById("su-confirm-msg");
    var okBtn = document.getElementById("su-confirm-ok");
    var cancelBtn = document.getElementById("su-confirm-cancel");
    var pending = null;
    function openDialog(form, name) {
      pending = form;
      msg.textContent = "Delete " + (name || "this") + "? This can't be undone.";
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      modal.setAttribute("aria-hidden", "false");
    }
    function closeDialog() {
      pending = null;
      modal.classList.add("hidden");
      modal.classList.remove("flex");
      modal.setAttribute("aria-hidden", "true");
    }
    document.addEventListener("click", function (e) {
      var t = e.target.closest("[data-confirm-delete]");
      if (t) {
        e.preventDefault();
        openDialog(t.closest("form"), t.getAttribute("data-confirm-name"));
      }
    });
    okBtn.addEventListener("click", function () { if (pending) pending.submit(); });
    cancelBtn.addEventListener("click", closeDialog);
    modal.addEventListener("click", function (e) { if (e.target === modal) closeDialog(); });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && !modal.classList.contains("hidden")) closeDialog();
    });
  })();
</script>
