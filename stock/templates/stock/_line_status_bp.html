{% load humanize design_nav %}{% if line.current is None %}<span class="text-slate-400 dark:text-slate-500">—</span>{% elif line.carried_over %}<span class="inline-flex items-center rounded-full bg-amber-50 px-2 py-0.5 text-xs font-medium text-amber-700 ring-1 ring-amber-200 dark:bg-amber-400/15 dark:text-amber-200 dark:ring-amber-400/20">last wk</span>{% elif line.needed %}<span class="inline-flex items-center rounded-full bg-rose-50 px-2 py-0.5 text-xs font-medium text-rose-700 ring-1 ring-rose-200 dark:bg-rose-500/10 dark:text-rose-300 dark:ring-rose-500/30">need {{ line.needed|floatformat:0 }}</span>{% else %}<span class="inline-flex items-center rounded-full bg-emerald-50 px-2 py-0.5 text-xs font-medium text-emerald-700 ring-1 ring-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-300 dark:ring-emerald-500/30">ok</span>{% endif %}{% if line.value %} <span class="ml-1.5 text-xs tabular text-slate-400 dark:text-slate-500">{{ line.value|gbp }}</span>{% endif %}
