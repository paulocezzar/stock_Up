{% load humanize %}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Bakery Stock{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  :root{
    --bg:#0e0f12; --panel:#16181d; --panel2:#1d2027; --line:#2a2e37;
    --ink:#e7e3d8; --muted:#8b8f9a; --amber:#f0a500; --amber-dim:#7a5a12;
    --red:#e0573e; --green:#3a9d6b;
    --mono:"DM Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --disp:"Space Grotesk",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:14px;line-height:1.5;
    background-image:radial-gradient(circle at 1px 1px,#1a1c22 1px,transparent 0);
    background-size:22px 22px;}
  a{color:var(--amber);text-decoration:none}
  header{border-bottom:1px solid var(--line);padding:18px 22px;
    display:flex;align-items:baseline;gap:20px;background:#0b0c0e}
  header h1{font-family:var(--disp);font-weight:600;font-size:18px;margin:0;
    letter-spacing:.5px;text-transform:uppercase}
  header h1 .dot{color:var(--amber)}
  nav a{margin-right:16px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  nav a.on{color:var(--amber)}
  main{padding:22px;max-width:1100px;margin:0 auto}
  .stats{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);
    padding:14px 18px;min-width:140px}
  .stat .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .stat .v{font-family:var(--disp);font-size:26px;font-weight:600;margin-top:4px}
  .stat.warn{border-left-color:var(--red)}
  .stat.warn .v{color:var(--red)}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line)}
  th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:500}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.low td{background:rgba(224,87,62,.07)}
  .tag{font-size:10px;padding:2px 7px;border:1px solid;letter-spacing:1px;text-transform:uppercase}
  .tag.low{color:var(--red);border-color:var(--red)}
  .tag.ok{color:var(--green);border-color:var(--green)}
  .muted{color:var(--muted)}
  input[type=text],input[type=number]{background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);font-family:var(--mono);padding:7px 9px;width:90px;text-align:right}
  input:focus{outline:none;border-color:var(--amber)}
  .btn{display:inline-block;background:var(--amber);color:#111;padding:8px 16px;
    font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:12px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>STOCK<span class="dot">.</span>OPS</h1>
  <nav>
    <a href="{% url 'dashboard' %}" class="{% block nav_d %}{% endblock %}">Dashboard</a>
    <a href="{% url 'count' %}" class="{% block nav_c %}{% endblock %}">Count</a>
    <a href="/admin/" class="">Admin</a>
  </nav>
</header>
<main>{% block body %}{% endblock %}</main>
</body>
</html>
