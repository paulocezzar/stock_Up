{% extends "stock/base.html" %}
{% block n_sup %}on{% endblock %}
{% block body %}
<h2>Suppliers</h2>
<div class="card"><h3>Add supplier</h3>
<form method="post" class="row">{% csrf_token %}
  <div class="field"><label>Name</label><input type="text" name="name" required placeholder="e.g. Wellocks"></div>
  <button class="btn" type="submit">Add</button>
</form></div>
<table>
  <thead><tr><th>Supplier</th><th class="num">Priced ingredients</th></tr></thead>
  <tbody>
  {% for s in suppliers %}<tr><td>{{ s.name }}</td><td class="num">{{ s.n }}</td></tr>
  {% empty %}<tr><td colspan="2" class="muted">None yet.</td></tr>{% endfor %}
  </tbody>
</table>
{% endblock %}
