<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Sign in · Stock Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0f12;--panel:#16181d;--panel2:#1d2027;--line:#2a2e37;--ink:#e7e3d8;--muted:#8b8f9a;--amber:#f0a500;--red:#e0573e;
    --dot-grid:#1a1c22;--mono:"DM Mono",monospace;--disp:"Space Grotesk",sans-serif;}
  html[data-theme="light"]{--bg:#f4f2ec;--panel:#ffffff;--panel2:#f0ede4;--line:#ddd8cc;--ink:#23211c;--muted:#7a7568;--amber:#b87400;--red:#c2412b;--dot-grid:#e8e4d8;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);
    font-family:var(--mono);background-image:radial-gradient(circle at 1px 1px,var(--dot-grid) 1px,transparent 0);background-size:22px 22px}
  .box{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--amber);padding:32px;width:320px}
  h1{font-family:var(--disp);text-transform:uppercase;letter-spacing:1px;font-size:18px;margin:0 0 22px}
  h1 .dot{color:var(--amber)}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:14px 0 5px}
  input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);padding:10px}
  input:focus{outline:none;border-color:var(--amber)}
  .btn{margin-top:22px;width:100%;background:var(--amber);color:#111;border:none;padding:11px;cursor:pointer;
    font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  .err{color:var(--red);font-size:12px;margin-top:12px}
</style>
<script>
(function(){try{var t=localStorage.getItem("stockops-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();
function toggleTheme(){var c=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";try{localStorage.setItem("stockops-theme",c);}catch(e){}document.documentElement.setAttribute("data-theme",c);}
</script></head><body>
<form class="box" method="post">{% csrf_token %}
  <h1>STOCK<span class="dot">.</span>OPS</h1>
  {% if form.errors %}<div class="err">Wrong username or password.</div>{% endif %}
  <label>Username</label><input name="username" autofocus>
  <label>Password</label><input name="password" type="password">
  <button class="btn" type="submit">Sign in</button>
  <div style="text-align:center;margin-top:14px"><a href="#" onclick="toggleTheme();return false;" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px">◐ toggle theme</a></div>
</form></body></html>
