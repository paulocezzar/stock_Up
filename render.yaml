services:
  - type: web
    name: bakery-stock
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn bakerystock.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DATABASE_URL
        fromDatabase:
          name: bakery-stock-db
          property: connectionString

databases:
  - name: bakery-stock-db
    plan: free
